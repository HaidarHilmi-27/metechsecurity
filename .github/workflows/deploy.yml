name: Deploy to GitHub Pages

on:
  push:
    branches: 'main' # Atau 'master', sesuaikan dengan branch utama Anda

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Sesuaikan versi Node Anda
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: build
        env:
          BASE_PATH: '/${{ github.event.repository.name }}'
        run: npm run build

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # Pastikan ini sesuai dengan folder hasil build Svelte Anda
          # Untuk SvelteKit biasanya 'build'. Untuk Vite Svelte murni biasanya 'dist'
          path: 'build/'

  deploy:
    needs: build_site
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4